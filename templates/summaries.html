{% extends "base.html" %}
{% block title %}Summaries{% endblock %}
{% block breadcrumb %}Patent Library{% endblock %}
{% block content %}
<div class="flex h-full" style="height:calc(100vh - 56px)" x-data="summariesPage()" x-init="init()">

  <!-- Sidebar panel -->
  <div class="flex flex-col" style="width:280px;flex-shrink:0;border-right:1px solid var(--border);height:100%">
    <div class="p-4" style="border-bottom:1px solid var(--border)">
      <p class="label mb-3">Patent Library <span class="badge badge-info" style="margin-left:6px;font-size:10px" x-text="filtered.length"></span></p>
      <input type="text" x-model="search" @input="filterPatents()" placeholder="Search patents…" class="w-full px-3 py-2 text-sm mb-2"/>
      <select x-model="filterJX" @change="filterPatents()" class="w-full px-3 py-2 text-sm">
        <option value="">All Jurisdictions</option>
        <option value="US">US</option><option value="EP">EP</option><option value="CN">CN</option>
      </select>
    </div>
    <div style="flex:1;overflow-y:auto">
      <template x-for="p in filtered" :key="p.id">
        <button @click="selectPatent(p)" class="w-full text-left px-4 py-3 transition-all duration-150"
                style="border-bottom:1px solid var(--border);background:transparent"
                :style="selected&&selected.id===p.id ? 'background:rgba(99,102,241,0.08);border-left:2px solid #6366f1' : 'border-left:2px solid transparent'"
                @mouseenter="$el.style.background='rgba(255,255,255,0.03)'"
                @mouseleave="$el.style.background=selected&&selected.id===p.id?'rgba(99,102,241,0.08)':'transparent'">
          <div class="flex items-center justify-between gap-2 mb-1">
            <span class="font-mono text-xs font-medium" style="color:#818cf8" x-text="p.patent_number"></span>
            <span class="badge badge-info" style="font-size:9px" x-text="p.jurisdiction"></span>
          </div>
          <p class="text-xs leading-snug" style="color:var(--text)" x-text="p.title.slice(0,60)+(p.title.length>60?'…':'')"></p>
          <p class="text-xs mt-1" style="color:var(--text3)" x-text="p.assignee||'Unknown assignee'"></p>
        </button>
      </template>
      <div x-show="filtered.length===0" class="p-6 text-center text-sm" style="color:var(--text3)">
        No patents match.<br/><a href="/upload" style="color:#818cf8;text-decoration:none">Upload one →</a>
      </div>
    </div>
  </div>

  <!-- Main panel -->
  <div class="flex flex-col flex-1 min-w-0" style="height:100%;overflow:hidden">

    <!-- Empty -->
    <div x-show="!selected" class="flex flex-col items-center justify-center h-full gap-4" style="color:var(--text3)">
      <div style="width:56px;height:56px;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M7 8h10M7 12h7M7 16h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <p class="text-sm">Select a patent from the sidebar to view its summary</p>
      <a href="/upload" class="btn btn-secondary" style="text-decoration:none;font-size:12px">+ Upload New Patent</a>
    </div>

    <!-- Detail -->
    <div x-show="selected" style="flex:1;overflow-y:auto;padding:28px" class="flex flex-col gap-5">
      <template x-if="selected">
        <div class="fade-up flex flex-col gap-5">

          <!-- Metadata row -->
          <div class="grid grid-cols-4 gap-3">
            <div class="card p-4" style="border-radius:12px">
              <p class="label mb-1.5">Patent No.</p>
              <p class="font-mono text-sm font-semibold" style="color:#818cf8" x-text="selected.patent_number"></p>
            </div>
            <div class="card p-4" style="border-radius:12px">
              <p class="label mb-1.5">Jurisdiction</p>
              <span class="badge badge-info" x-text="selected.jurisdiction"></span>
            </div>
            <div class="card p-4" style="border-radius:12px">
              <p class="label mb-1.5">Assignee</p>
              <p class="text-sm text-white" x-text="selected.assignee||'—'"></p>
            </div>
            <div class="card p-4" style="border-radius:12px">
              <p class="label mb-1.5">Published</p>
              <p class="font-mono text-sm" x-text="selected.publication_date||'—'"></p>
            </div>
          </div>

          <!-- Title + actions -->
          <div class="card p-5 flex items-center gap-4" style="border-radius:14px">
            <div class="flex-1">
              <p class="label mb-1">Title</p>
              <h2 class="font-display text-xl font-bold text-white leading-tight" x-text="selected.title"></h2>
            </div>
            <div class="flex gap-2 flex-shrink-0">
              <button class="btn btn-primary" @click="loadSummary()" :disabled="summaryLoading">
                <span x-show="!summaryLoading" class="flex items-center gap-1.5">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" fill="currentColor"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                  Generate Summary
                </span>
                <span x-show="summaryLoading" class="flex items-center gap-1.5">
                  <div class="spinner" style="width:12px;height:12px"></div>Analysing…
                </span>
              </button>
              <a :href="'/compare?a='+selected.id" class="btn btn-secondary" style="text-decoration:none;font-size:12px">Compare →</a>
            </div>
          </div>

          <!-- LLM Summary -->
          <div x-show="summary" x-transition class="card p-5 flex flex-col gap-4" style="border-radius:14px">
            <div class="flex items-center gap-3 mb-1">
              <p class="label">AI Technical Brief</p>
              <span class="badge badge-low" style="font-size:9px">Gemini Verified</span>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <p class="label mb-2">Abstract</p>
                <p class="text-sm leading-relaxed" style="color:var(--text)" x-text="summary.abstract"></p>
              </div>
              <div>
                <p class="label mb-1">Domain</p>
                <p class="text-sm text-white mb-3" x-text="summary.technology_domain"></p>
                <p class="label mb-1">Novelty</p>
                <p class="text-sm leading-relaxed" style="color:var(--text)" x-text="summary.novelty_statement"></p>
              </div>
            </div>
            <!-- Claims box -->
            <div style="background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.2);border-radius:10px;padding:16px">
              <p class="label mb-3" style="color:#818cf8">⬡ Core Independent Claims</p>
              <ul class="flex flex-col gap-2">
                <template x-for="(c,i) in summary.key_claims" :key="i">
                  <li class="flex gap-2.5 text-sm">
                    <span class="font-mono text-xs flex-shrink-0 mt-0.5" style="color:#818cf8" x-text="(i+1)+'.'"></span>
                    <span style="color:var(--text)" x-text="c"></span>
                  </li>
                </template>
              </ul>
            </div>
            <div>
              <p class="label mb-1">Commercial Relevance</p>
              <p class="text-sm" style="color:var(--text)" x-text="summary.commercial_relevance"></p>
            </div>
          </div>

          <!-- Patent Figures -->
          <div x-show="images.length > 0" class="card overflow-hidden" style="border-radius:14px">
            <div class="px-5 py-3 flex items-center justify-between" style="border-bottom:1px solid var(--border)">
              <p class="label">Patent Figures</p>
              <span class="badge badge-info font-mono" x-text="images.length+' figure'+(images.length===1?'':'s')"></span>
            </div>
            <div style="overflow-x:auto;padding:16px">
              <div style="display:flex;gap:16px;min-width:max-content">
                <template x-for="img in images" :key="img.id">
                  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0">
                    <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fff;width:220px;height:160px;display:flex;align-items:center;justify-content:center">
                      <img :src="'/api/v1/images/'+img.id"
                           :alt="'Page '+img.page_number"
                           style="max-width:218px;max-height:158px;object-fit:contain;display:block"
                           loading="lazy"/>
                    </div>
                    <span class="font-mono text-xs" style="color:var(--text3)" x-text="'p. '+img.page_number"></span>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <!-- Chunks table -->
          <div class="card overflow-hidden" style="border-radius:14px">
            <div class="px-5 py-3 flex items-center justify-between" style="border-bottom:1px solid var(--border)">
              <p class="label">Extracted Sections</p>
              <span class="badge badge-info font-mono" x-text="chunks.length+' chunks'"></span>
            </div>
            <div style="max-height:280px;overflow-y:auto">
              <table>
                <thead><tr><th>Type</th><th>Content Preview</th></tr></thead>
                <tbody>
                  <template x-for="(c,i) in chunks" :key="i">
                    <tr>
                      <td style="width:140px">
                        <span class="badge"
                              :class="{
                                'badge-clear':  c.section_type==='claim_independent',
                                'badge-medium': c.section_type==='claim_dependent',
                                'badge-low':    c.section_type==='description',
                              }"
                              x-text="c.section_type.replace('_',' ')"></span>
                      </td>
                      <td class="text-xs" style="color:var(--text2)" x-text="c.content.slice(0,200)+(c.content.length>200?'…':'')"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>

        </div>
      </template>
    </div>
  </div>
</div>

<script>
function summariesPage(){
  return {
    allPatents:{{ patents|tojson }}, filtered:[], selected:null,
    search:'', filterJX:'', summary:null, chunks:[], images:[], summaryLoading:false,
    init(){ this.filtered=[...this.allPatents]; },
    filterPatents(){
      const q=this.search.toLowerCase();
      this.filtered=this.allPatents.filter(p=>
        (!q||p.patent_number.toLowerCase().includes(q)||p.title.toLowerCase().includes(q)||(p.assignee||'').toLowerCase().includes(q))&&
        (!this.filterJX||p.jurisdiction===this.filterJX));
    },
    async selectPatent(p){
      this.selected=p; this.summary=null; this.chunks=[]; this.images=[];
      try{
        const [cr, ir] = await Promise.all([
          fetch(`/api/v1/patents/${p.id}`),
          fetch(`/api/v1/patents/${p.id}/images`),
        ]);
        const cd=await cr.json(); this.chunks=cd.chunks||[];
        this.images=await ir.json();
      }catch(e){}
    },
    async loadSummary(){
      if(!this.selected)return; this.summaryLoading=true;
      try{ const r=await fetch(`/api/v1/patents/${this.selected.id}/summary`); const d=await r.json(); this.summary=d.summary; }
      catch(e){}finally{ this.summaryLoading=false; }
    }
  }
}
</script>
{% endblock %}
